{% extends "layout.html" %}

{% block content %}

    <div class="row">
        <div class="col-md-8 offset-md-2 text-center">
            <h1>Welcome to Network Operations University.</h1>
            <p class="lead mt-3">
                Browse our course catalog, enroll in classes, and manage your schedule -- all in one place.
            </p>

            {% if session["username"] %}
                <hr class="my-4">
                <a href="{{ url_for('courses') }}" class="btn btn-primary btn-lg me-2">Browse Courses</a>
                <a href="{{ url_for('enrollment') }}" class="btn btn-outline-secondary btn-lg">My Enrollment</a>
            {% else %}
                <hr class="my-4">
                <a href="{{ url_for('register') }}" class="btn btn-primary btn-lg me-2">Get Started</a>
                <a href="{{ url_for('login') }}" class="btn btn-outline-secondary btn-lg">Login</a>
            {% endif %}

        </div>
    </div>

{% endblock %}
